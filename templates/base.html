<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Google Fonts (only here!) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
          rel="stylesheet">

    <link rel="icon" type="image/png" href="/static/logo.png">

    <title>{% block title %}{% endblock %}</title>
</head>

<body>
<div class="page-wrapper">

    {% include 'header.html' %}

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    {% include 'footer.html' %}

</div>

{% block scripts %}
{% endblock %}
<script src="{{ url_for('static', filename='script.js') }}"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    const items = document.querySelectorAll('.nav-item');

    items.forEach(item => {
        item.addEventListener('click', function () {
            items.forEach(i => i.classList.remove('active'));
            this.classList.add('active');
        });
    });
});
</script>

</body>
</html>
