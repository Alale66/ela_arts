{% extends "base.html" %}

{% block title %}Blog – Ela Arts{% endblock %}

{% block content %}

<section class="blog-section" xmlns="http://www.w3.org/1999/html">
    <div class="blog-container">
        <div><h1>{{ post.title }}</h1><p class="blog-meta">{{ post.author }} • {{ post.date }} • {{ post.read_time }}</p></div>

        <img class="blog-hero" src="{{ post.image }}" alt="{{ post.title }}">

<span>
        {{ post.content | safe }}
</span>
    </div>
</section>

{% endblock %}
